name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check TypeScript strict (no any)
        run: |
          count=$(grep -r "any" packages/*/src/*.ts packages/*/src/**/*.ts --include="*.ts" -l 2>/dev/null | xargs grep -c ": any\b" 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count 'any' type usages"
          fi
